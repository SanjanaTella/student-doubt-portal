<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #eef2f3, #ffffff);
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }

        textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #34495e;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
    <a href="/logout/">Logout</a>
</div>

<div class="container">
    <h2>Give Feedback</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Rating</label>
        <select name="rating">
            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
            <option value="4">⭐⭐⭐⭐ Good</option>
            <option value="3">⭐⭐⭐ Average</option>
            <option value="2">⭐⭐ Poor</option>
            <option value="1">⭐ Very Poor</option>
        </select>

        <textarea name="message" placeholder="Write your feedback..."></textarea>

        <button type="submit">Submit Feedback</button>
    </form>
</div>

</body>
</html>
