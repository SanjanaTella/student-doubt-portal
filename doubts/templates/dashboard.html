<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #eef2f3, #ffffff);
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            color: white;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #34495e;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
    <a href="/add_doubt/">Add Doubt</a>
    <a href="/view_doubts/">View Doubts</a>
    <a href="/logout/">Logout</a>
    <a href="/feedback/">Feedback</a>
</div>

<div class="container">
    <h2>Welcome to Dashboard</h2>

    <a href="/add_doubt/" class="btn">➕ Add Doubt</a>
    <a href="/view_doubts/" class="btn">📄 View Doubts</a>
</div>

</body>
</html>
