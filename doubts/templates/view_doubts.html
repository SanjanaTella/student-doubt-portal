<!DOCTYPE html>
<html>
<head>
    <title>View Doubts</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #eef2f3, #ffffff);
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            color: white;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .pending {
            color: red;
            font-weight: bold;
        }

        .answered {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
    <a href="/add_doubt/">Add Doubt</a>
    <a href="/view_doubts/">View Doubts</a>
    <a href="/logout/">Logout</a>
</div>

<div class="container">
    <h2>Your Doubts</h2>

    <table>
        <tr>
            <th>Subject</th>
            <th>Doubt</th>
            <th>Answer</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for doubt in doubts %}
        <tr>
            <td>{{ doubt.subject }}</td>
            <td>{{ doubt.doubt_text }}</td>
            <td>{{ doubt.answer }}</td>
            <td>
                {% if doubt.status == "Pending" %}
                    <span class="pending">Pending</span>
                {% else %}
                    <span class="answered">Answered</span>
                {% endif %}
            </td>
            <td>
                <a href="/edit_doubt/{{ doubt.id }}">Edit</a> |
                <a href="/delete_doubt/{{ doubt.id }}" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
